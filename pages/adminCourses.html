<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dynamite Schedules | Manage Courses</title>
        <link rel="stylesheet" href="/styles/cartStyle.css">
        <script src="/scripts/adminCourses.js" defer></script>
    </head>
    <body class="cart-page">
        <div class="page-banner">
            <h1>Manage Courses</h1>
        </div>

        <div class="page-shell">
            <section class="list-panel">
                <p id="admin-message" class="cart-message"></p>

                <!-- Search and Add -->
                <div style="display:flex; gap:0.75rem; margin-bottom:1rem;">
                    <input type="text" id="course-search" placeholder="Search by ID or name..."
                        style="flex:1; padding:0.5rem; background:rgb(31,41,55); color:white; border:1px solid white; border-radius:0.375rem;">
                    <button class="action-button" onclick="openAddModal()">+ Add Course</button>
                </div>

                <!-- Course List -->
                <div id="course-list" class="cart-list">
                    <div class="cart-card empty-state">Loading courses...</div>
                </div>
            </section>

            <!-- Edit Modal -->
            <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:50; justify-content:center; align-items:center;">
                <div style="background:rgb(31,41,55); border:2px solid white; border-radius:0.5rem; padding:2rem; width:min(90%,500px); max-height:80vh; overflow-y:auto;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h2 style="color:white; font-family:monospace; font-weight:800; margin:0;" id="modal-title">Edit Course</h2>
                        <button onclick="closeModal()" style="color:white; background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
                    </div>
                    <input type="hidden" id="edit-course-id">

                    <label style="color:white; font-family:monospace;">Course ID</label>
                    <input type="text" id="edit-id" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box;">

                    <label style="color:white; font-family:monospace;">Name</label>
                    <input type="text" id="edit-name" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box;">

                    <label style="color:white; font-family:monospace;">Credits</label>
                    <input type="number" id="edit-credits" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box;">

                    <label style="color:white; font-family:monospace;">Department</label>
                    <input type="text" id="edit-department" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box;">

                    <label style="color:white; font-family:monospace;">Description</label>
                    <textarea id="edit-description" rows="3" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box; resize:vertical;"></textarea>

                    <label style="color:white; font-family:monospace;">Prerequisites (comma separated)</label>
                    <input type="text" id="edit-prerequisite" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box;">

                    <label style="color:white; font-family:monospace;">Corequisites (comma separated)</label>
                    <input type="text" id="edit-corequisite" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box;">

                    <label style="color:white; font-family:monospace;">Requirement Tags (comma separated)</label>
                    <input type="text" id="edit-requirementTag" style="width:100%; margin:0.25rem 0 0.75rem; padding:0.5rem; background:rgb(55,65,81); color:white; border:1px solid white; border-radius:0.375rem; box-sizing:border-box;">

                    <div style="display:flex; gap:0.75rem; margin-top:1rem;">
                        <button onclick="saveCourse()" class="action-button">Save</button>
                        <button onclick="closeModal()" class="action-button">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <a href="/dashboard" class="back-link bottom-link">Back to Dashboard</a>
        <button id="logout-button" class="logout-button">Logout</button>
        <script src="/scripts/logout.js" defer></script>
    </body>
</html>
